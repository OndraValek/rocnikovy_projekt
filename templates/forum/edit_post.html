{% extends 'base.html' %}
{% load static %}

{% block title %}Upravit příspěvek - {{ block.super }}{% endblock %}

{% block content %}
<div class="fade-in">
    <div class="row justify-content-center">
        <div class="col-md-10 col-lg-8">
            <div class="card shadow-soft border-0">
                <div class="card-header">
                    <h1 class="mb-0 text-white">
                        <i class="bi bi-pencil-square"></i> Upravit příspěvek
                    </h1>
                </div>
                <div class="card-body p-4">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label for="content" class="form-label">
                                <i class="bi bi-text-paragraph text-primary"></i> Obsah <span class="text-danger">*</span>
                            </label>
                            <textarea class="form-control" id="content" name="content" rows="10" required>{{ post.content }}</textarea>
                        </div>
                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle"></i> Uložit změny
                            </button>
                            <a href="{% url 'forum:thread_detail' post.thread.id %}" class="btn btn-secondary">
                                <i class="bi bi-x-circle"></i> Zrušit
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
